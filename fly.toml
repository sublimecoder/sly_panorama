# fly.toml app configuration file generated for sly-panorama on 2026-04-16T17:48:52Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sly-panorama'
primary_region = 'iad'
kill_signal = 'SIGTERM'

[build]

[env]
  # Must match the Host header for your public site (custom domain). If this is the Fly
  # default hostname while users hit e.g. slypanorama.com, CanonicalizeUrl redirects forever.
  # Omit to use runtime default (slypanorama.com) or set: fly secrets set PHX_HOST=your.domain
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
